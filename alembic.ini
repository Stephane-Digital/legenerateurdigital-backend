# ============================================================
# ALEMBIC CONFIGURATION — LE GÉNÉRATEUR DIGITAL (LGD)
# Compatible FastAPI + SQLAlchemy + PostgreSQL
# ============================================================

[alembic]
script_location = migrations
prepend_sys_path = .

# IMPORTANT : Alembic utilisera l'URL de la base dans env.py,
# donc ON NE MET PAS l'URL ici.
sqlalchemy.url =

# Format par défaut des noms de migrations
file_template = %%(rev)s_%%(slug)s

# Utilise le séparateur système (Windows = ; / Linux = :)
path_separator = os


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console


[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
